name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Determine CI artifact version
        id: version
        shell: bash
        run: |
          VERSION="$(python3 eng/release/resolve-version.py --props Directory.Build.props --ci-run-number "${GITHUB_RUN_NUMBER}")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "AXSG_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Restore
        run: dotnet restore XamlToCSharpGenerator.CI.slnf

      - name: Build
        run: dotnet build XamlToCSharpGenerator.CI.slnf -c Release --no-restore -m:1 /nodeReuse:false --disable-build-servers

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore XamlToCSharpGenerator.CI.slnf

      - name: Build
        run: dotnet build XamlToCSharpGenerator.CI.slnf -c Release --no-restore -m:1 /nodeReuse:false --disable-build-servers

      - name: Test
        run: dotnet test tests/XamlToCSharpGenerator.Tests/XamlToCSharpGenerator.Tests.csproj -c Release -m:1 /nodeReuse:false --disable-build-servers --no-build --logger trx --results-directory artifacts/test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts/test/**/*.trx
          if-no-files-found: error
          retention-days: 7

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: artifacts/test/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build docs
        run: bash ./build-docs.sh

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/.lunet/build/www
          if-no-files-found: error
          retention-days: 14

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: [build, test, docs]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/vscode/axsg-language-server/package-lock.json

      - name: Restore
        run: dotnet restore XamlToCSharpGenerator.CI.slnf

      - name: Build
        run: dotnet build XamlToCSharpGenerator.CI.slnf -c Release --no-restore -m:1 /nodeReuse:false --disable-build-servers

      - name: Pack NuGet artifacts
        shell: bash
        env:
          AXSG_VERSION: ${{ needs.build.outputs.version }}
        run: |
          bash eng/release/pack-nuget-artifacts.sh "${AXSG_VERSION}" "${GITHUB_WORKSPACE}/artifacts/nuget"

      - name: Package VS Code extension
        shell: bash
        env:
          AXSG_VERSION: ${{ needs.build.outputs.version }}
        run: |
          bash eng/release/package-vscode-extension.sh "${AXSG_VERSION}" "${GITHUB_WORKSPACE}/artifacts/vsix/axsg-language-server-${AXSG_VERSION}.vsix"

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ needs.build.outputs.version }}
          path: |
            artifacts/nuget/*.nupkg
            artifacts/vsix/*.vsix
          if-no-files-found: error
          retention-days: 30

  mobile-build:
    name: Mobile Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Restore shared generator and sample graph
        run: dotnet restore XamlToCSharpGenerator.CI.slnf --nologo

      - name: Restore iOS workload
        run: dotnet workload restore samples/ControlCatalog.iOS/ControlCatalog.iOS.csproj --nologo --skip-manifest-update

      - name: Restore Android workload
        run: dotnet workload restore samples/ControlCatalog.Android/ControlCatalog.Android.csproj --nologo --skip-manifest-update

      - name: Restore iOS sample
        run: dotnet restore samples/ControlCatalog.iOS/ControlCatalog.iOS.csproj --nologo

      - name: Restore Android sample
        run: dotnet restore samples/ControlCatalog.Android/ControlCatalog.Android.csproj --nologo

      - name: Build iOS sample
        run: dotnet build samples/ControlCatalog.iOS/ControlCatalog.iOS.csproj --nologo --no-restore -m:1 /nodeReuse:false --disable-build-servers

      - name: Build Android sample
        run: dotnet build samples/ControlCatalog.Android/ControlCatalog.Android.csproj --nologo --no-restore -m:1 /nodeReuse:false --disable-build-servers

  perf-sourcegen:
    name: SourceGen Perf Harness
    runs-on: ubuntu-latest
    env:
      AXSG_RUN_PERF_TESTS: 'true'
      AXSG_PERF_MAX_FULL_BUILD_MS: '150000'
      AXSG_PERF_MAX_SINGLE_EDIT_MS: '50000'
      AXSG_PERF_MAX_INCLUDE_EDIT_MS: '70000'
      AXSG_PERF_MAX_INCREMENTAL_TO_FULL_RATIO: '25'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore tests/XamlToCSharpGenerator.Tests/XamlToCSharpGenerator.Tests.csproj --nologo

      - name: Run SourceGen Perf Harness
        run: dotnet test tests/XamlToCSharpGenerator.Tests/XamlToCSharpGenerator.Tests.csproj --nologo --no-restore -m:1 /nodeReuse:false --disable-build-servers --filter "FullyQualifiedName~PerformanceHarnessTests"

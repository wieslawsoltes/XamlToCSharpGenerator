name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: "true"

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/vscode/axsg-language-server/package-lock.json

      - name: Resolve CI artifact version
        shell: bash
        run: |
          version="$(python3 eng/release/resolve-version.py --props Directory.Build.props --ci-run-number "${GITHUB_RUN_NUMBER}")"
          echo "AXSG_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Restore
        run: dotnet restore XamlToCSharpGenerator.CI.slnf

      - name: Build
        run: dotnet build XamlToCSharpGenerator.CI.slnf -c Release -m:1 /nodeReuse:false --disable-build-servers

      - name: Test
        run: dotnet test tests/XamlToCSharpGenerator.Tests/XamlToCSharpGenerator.Tests.csproj -c Release -m:1 /nodeReuse:false --disable-build-servers --no-build

      - name: Pack NuGet artifacts
        shell: bash
        run: |
          bash eng/release/pack-nuget-artifacts.sh "${GITHUB_WORKSPACE}/artifacts/nuget" "${AXSG_VERSION}"

      - name: Package VS Code extension
        shell: bash
        run: |
          bash eng/release/package-vscode-extension.sh "${GITHUB_WORKSPACE}/artifacts/vsix/axsg-language-server-${AXSG_VERSION}.vsix" "${AXSG_VERSION}"

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.run_number }}
          path: |
            artifacts/nuget/*.nupkg
            artifacts/vsix/*.vsix

  mobile-build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Restore shared generator and sample graph
        run: dotnet restore XamlToCSharpGenerator.CI.slnf --nologo

      - name: Restore iOS workload
        run: dotnet workload restore samples/ControlCatalog.iOS/ControlCatalog.iOS.csproj --nologo --skip-manifest-update

      - name: Restore Android workload
        run: dotnet workload restore samples/ControlCatalog.Android/ControlCatalog.Android.csproj --nologo --skip-manifest-update

      - name: Build iOS sample
        run: dotnet build samples/ControlCatalog.iOS/ControlCatalog.iOS.csproj --nologo -m:1 /nodeReuse:false --disable-build-servers

      - name: Build Android sample
        run: dotnet build samples/ControlCatalog.Android/ControlCatalog.Android.csproj --nologo -m:1 /nodeReuse:false --disable-build-servers

  perf-sourcegen:
    runs-on: ubuntu-latest
    env:
      AXSG_RUN_PERF_TESTS: "true"
      AXSG_PERF_MAX_FULL_BUILD_MS: "150000"
      AXSG_PERF_MAX_SINGLE_EDIT_MS: "50000"
      AXSG_PERF_MAX_INCLUDE_EDIT_MS: "70000"
      AXSG_PERF_MAX_INCREMENTAL_TO_FULL_RATIO: "25"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/XamlToCSharpGenerator.Tests/XamlToCSharpGenerator.Tests.csproj --nologo

      - name: Run SourceGen Perf Harness
        run: dotnet test tests/XamlToCSharpGenerator.Tests/XamlToCSharpGenerator.Tests.csproj --nologo -m:1 /nodeReuse:false --disable-build-servers --filter "FullyQualifiedName~PerformanceHarnessTests"

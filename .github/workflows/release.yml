name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0-alpha.1)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}
      release-tag: ${{ steps.version.outputs.release-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$VERSION" == *"-"* ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          else
            VERSION="$(python3 eng/release/resolve-version.py --props Directory.Build.props --ci-run-number "${GITHUB_RUN_NUMBER}")"
            IS_PRERELEASE="true"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "is-prerelease=${IS_PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "release-tag=v${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "AXSG_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Restore
        run: dotnet restore XamlToCSharpGenerator.CI.slnf

      - name: Build
        run: dotnet build XamlToCSharpGenerator.CI.slnf -c Release --no-restore -m:1 /nodeReuse:false --disable-build-servers

  test:
    name: Test Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore XamlToCSharpGenerator.CI.slnf

      - name: Build
        run: dotnet build XamlToCSharpGenerator.CI.slnf -c Release --no-restore -m:1 /nodeReuse:false --disable-build-servers

      - name: Test
        run: dotnet test tests/XamlToCSharpGenerator.Tests/XamlToCSharpGenerator.Tests.csproj -c Release -m:1 /nodeReuse:false --disable-build-servers --no-build --logger trx --results-directory artifacts/test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-test-results
          path: artifacts/test/**/*.trx
          if-no-files-found: error
          retention-days: 7

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Release Test Results
          path: artifacts/test/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  pack:
    name: Pack Release
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/vscode/axsg-language-server/package-lock.json

      - name: Restore
        run: dotnet restore XamlToCSharpGenerator.CI.slnf

      - name: Build
        run: dotnet build XamlToCSharpGenerator.CI.slnf -c Release --no-restore -m:1 /nodeReuse:false --disable-build-servers

      - name: Pack NuGet artifacts
        shell: bash
        env:
          AXSG_VERSION: ${{ needs.build.outputs.version }}
        run: |
          bash eng/release/pack-nuget-artifacts.sh "${AXSG_VERSION}" "${GITHUB_WORKSPACE}/artifacts/nuget"

      - name: Package VS Code extension
        shell: bash
        env:
          AXSG_VERSION: ${{ needs.build.outputs.version }}
        run: |
          bash eng/release/package-vscode-extension.sh "${AXSG_VERSION}" "${GITHUB_WORKSPACE}/artifacts/vsix/axsg-language-server-${AXSG_VERSION}.vsix"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: |
            artifacts/nuget/*.nupkg
            artifacts/vsix/*.vsix
          if-no-files-found: error
          retention-days: 90

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [build, pack]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    environment: nuget
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: release-artifacts

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish NuGet artifacts
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "NUGET_API_KEY is not configured." >&2
            exit 1
          fi
          while IFS= read -r -d '' package; do
            dotnet nuget push "${package}" \
              --api-key "${NUGET_API_KEY}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done < <(find release-artifacts -type f -name '*.nupkg' -print0)

  publish-vscode-marketplace:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: [build, pack]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    environment: vscode-marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/vscode/axsg-language-server/package-lock.json

      - name: Publish VS Code Marketplace extension
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX_PATH="${RUNNER_TEMP}/axsg-language-server-marketplace.vsix"
          AXSG_VSCODE_PRERELEASE=false \
            bash eng/release/package-vscode-extension.sh \
            "${{ needs.build.outputs.version }}" \
            "${VSIX_PATH}"
          bash eng/release/publish-vscode-marketplace.sh \
            "${VSIX_PATH}" \
            "false"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, pack, publish-nuget, publish-vscode-marketplace]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: XamlToCSharpGenerator v${{ needs.build.outputs.version }}
          tag_name: ${{ needs.build.outputs.release-tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ needs.build.outputs.is-prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.nupkg
            release-artifacts/**/*.vsix
